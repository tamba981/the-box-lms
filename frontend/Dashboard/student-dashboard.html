<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard · THE BOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ----- CSS Variables & Base ----- */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --secondary: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f8fafc;
            --border: #e5e7eb;
            --dark-bg: #0f172a;
            --dark-text: #e2e8f0;
            --dark-card: rgba(30, 41, 59, 0.7);
            --dark-border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --glass-primary: rgba(255, 255, 255, 0.12);
            --glass-secondary: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-border-hover: rgba(37, 99, 235, 0.30);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --glass-shadow-hover: 0 12px 48px rgba(37, 99, 235, 0.12);
            --glass-blur: 20px;
            --shadow-glow: 0 0 30px rgba(37, 99, 235, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            line-height: 1.6;
            background-attachment: fixed;
            transition: background 0.3s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--dark-text);
        }

        /* ----- Premium Glassmorphism ----- */
        .glass-premium {
            background: var(--glass-primary);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-premium:hover {
            transform: translateY(-4px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--glass-shadow-hover);
        }

        body.dark-mode .glass-premium {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .glass-premium:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(37, 99, 235, 0.25);
        }

        /* ----- Header (frosted glass) ----- */
        .header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }

        body.dark-mode .header {
            background: rgba(15, 23, 42, 0.75);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            max-width: 1400px;
            margin: 0 auto;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .header-search {
            flex: 1;
            max-width: 400px;
            min-width: 140px;
            position: relative;
        }
        .header-search input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.40);
            backdrop-filter: blur(6px);
            font-size: 14px;
            transition: 0.3s;
        }
        body.dark-mode .header-search input {
            background: rgba(30, 41, 59, 0.30);
            border-color: rgba(255, 255, 255, 0.06);
            color: var(--dark-text);
        }
        .header-search input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }
        .header-search i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text);
            position: relative;
        }
        body.dark-mode .btn-icon {
            background: rgba(30, 41, 59, 0.30);
            border-color: rgba(255, 255, 255, 0.05);
            color: var(--dark-text);
        }
        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .notification-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }
        body.dark-mode .notification-badge {
            border-color: var(--dark-bg);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.30);
        }

        .logout-btn {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        body.dark-mode .logout-btn {
            color: var(--dark-text);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .logout-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            transform: translateY(-2px);
        }

        /* ----- Sidebar (glass) ----- */
        .sidebar {
            width: 270px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            padding: 20px 16px;
            position: fixed;
            height: calc(100vh - 66px);
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 50;
        }

        body.dark-mode .sidebar {
            background: rgba(15, 23, 42, 0.65);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 4px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text);
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
        }
        body.dark-mode .sidebar-link {
            color: var(--dark-text);
        }

        .sidebar-link:hover {
            background: rgba(37, 99, 235, 0.08);
        }

        .sidebar-link.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--shadow-glow);
            transform: translateX(6px);
        }

        .sidebar-link i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }

        .sidebar-footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        body.dark-mode .sidebar-footer {
            border-top-color: rgba(255, 255, 255, 0.04);
        }
        .sidebar-footer .sidebar-link {
            font-size: 13px;
        }

        /* ----- Main Content ----- */
        .main-content {
            flex: 1;
            margin-left: 270px;
            padding: 28px 32px 40px;
            transition: margin 0.3s;
        }

        /* ----- Stats Cards (with counter) ----- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            padding: 22px 20px;
            cursor: default;
            transition: all 0.3s;
        }

        .stat-title {
            color: var(--text-light);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 34px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-change.up {
            color: var(--success);
        }
        .stat-change.down {
            color: var(--danger);
        }

        /* ----- Section Title ----- */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* ----- Courses Grid ----- */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .course-card {
            overflow: hidden;
            transition: all 0.3s;
            cursor: default;
        }

        .course-image {
            height: 150px;
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 20px 20px 0 0;
        }

        .course-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        .course-badge.in-progress {
            background: rgba(245, 158, 11, 0.85);
            color: white;
        }
        .course-badge.completed {
            background: rgba(16, 185, 129, 0.85);
            color: white;
        }
        .course-badge.new {
            background: rgba(37, 99, 235, 0.85);
            color: white;
        }

        .course-content {
            padding: 20px 22px 22px;
        }

        .course-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .course-meta {
            font-size: 13px;
            color: var(--text-light);
            margin: 6px 0 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* Progress ring (SVG) */
        .progress-ring-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 14px 0;
        }
        .progress-ring-container {
            position: relative;
            width: 56px;
            height: 56px;
        }
        .progress-ring-container svg {
            transform: rotate(-90deg);
        }
        .progress-ring-container .bg {
            fill: none;
            stroke: rgba(0, 0, 0, 0.06);
            stroke-width: 5;
        }
        .progress-ring-container .fg {
            fill: none;
            stroke: var(--primary);
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease;
        }
        .progress-ring-container .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        body.dark-mode .progress-ring-container .bg {
            stroke: rgba(255, 255, 255, 0.08);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            color: var(--text);
        }
        body.dark-mode .btn-outline {
            border-color: rgba(255, 255, 255, 0.06);
            color: var(--dark-text);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ----- Empty State ----- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .empty-state i {
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 6px;
        }

        /* ----- Notifications Panel (glass) ----- */
        .notifications-panel {
            position: fixed;
            top: 66px;
            right: -420px;
            width: 400px;
            height: calc(100vh - 66px);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 200;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        body.dark-mode .notifications-panel {
            background: rgba(15, 23, 42, 0.88);
            border-left: 1px solid rgba(255, 255, 255, 0.04);
        }
        .notifications-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
            position: sticky;
            top: 0;
            background: inherit;
            backdrop-filter: inherit;
            z-index: 2;
        }
        body.dark-mode .panel-header {
            border-bottom-color: rgba(255, 255, 255, 0.04);
        }

        .notification-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .notification-item:hover {
            background: rgba(37, 99, 235, 0.04);
        }
        .notification-item.unread {
            border-left: 3px solid var(--primary);
        }
        .notification-item strong {
            display: block;
            font-size: 14px;
        }
        .notification-item p {
            font-size: 13px;
            margin: 4px 0;
            color: var(--text-light);
        }
        .notification-item .time {
            font-size: 11px;
            color: var(--text-light);
        }

        /* ----- Modal (glass) ----- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 28px;
            max-width: 580px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }
        body.dark-mode .modal-content {
            background: rgba(15, 23, 42, 0.88);
            border-color: rgba(255, 255, 255, 0.04);
        }

        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
        }
        .modal-body {
            padding: 24px;
        }

        /* ----- Chat UI in modal ----- */
        .chat-messages-area {
            height: 340px;
            overflow-y: auto;
            padding: 8px 4px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
        }
        .message.received .bubble {
            background: rgba(37, 99, 235, 0.08);
            padding: 10px 16px;
            border-radius: 16px 16px 16px 4px;
            display: inline-block;
        }
        .message.sent {
            align-self: flex-end;
        }
        .message.sent .bubble {
            background: var(--primary-gradient);
            color: white;
            padding: 10px 16px;
            border-radius: 16px 16px 4px 16px;
            display: inline-block;
        }

        /* ----- AI Tutor ----- */
        .ai-response {
            margin-top: 20px;
            padding: 20px;
            background: rgba(37, 99, 235, 0.05);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
            display: none;
        }

        /* ----- Misc ----- */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37, 99, 235, 0.12);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }
        body.dark-mode .mobile-menu-btn {
            color: var(--dark-text);
        }

        /* ----- Responsive ----- */
        @media (max-width: 992px) {
            .courses-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 150;
                width: 270px;
                height: 100vh;
                top: 0;
                padding-top: 70px;
                border-right: none;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .header-search {
                display: none;
            }
            .header-content {
                padding: 8px 16px;
            }
            .mobile-menu-btn {
                display: block;
            }
            .notifications-panel {
                width: 100%;
                right: -100%;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header-right .user-name {
                display: none;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-in-up {
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.2);
            }
            50% {
                box-shadow: 0 0 20px 4px rgba(37, 99, 235, 0.08);
            }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* Toast animation (injected) */
        @keyframes toastFadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle sidebar">☰</button>
                <a href="/" class="logo">THE BOX</a>
            </div>

            <div class="header-search">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" placeholder="Search courses, instructors..." />
            </div>

            <div class="header-right">
                <span class="user-name" id="user-name" style="font-weight:600;">Student</span>
                <button class="btn-icon" id="notifBtn" aria-label="Notifications">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notifCount">0</span>
                </button>
                <button class="btn-icon" id="theme-toggle" aria-label="Toggle theme">🌙</button>
                <div class="user-avatar" id="userAvatar">S</div>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <!-- ===== DASHBOARD ===== -->
    <div class="dashboard" style="display:flex;">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="#" class="sidebar-link active" data-page="overview"><i class="fas fa-tachometer-alt"></i> Overview</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="courses"><i class="fas fa-book"></i> My Courses</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="live-sessions"><i class="fas fa-video"></i> Live Sessions</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="community"><i class="fas fa-users"></i> Community</a></li>

        // ============================================================
        function animateCounter(el, target, duration = 2000) {
            const start = 0;
            const startTime = performance.now();

            function update(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(eased * target);
                el.textContent = current.toLocaleString();
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function observeCounters() {
            const counters = document.querySelectorAll('.stat-value[data-target]');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = parseInt(entry.target.dataset.target, 10);
                        animateCounter(entry.target, target);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.3 });
            counters.forEach(el => observer.observe(el));
        }

                <div class="stats-grid">
                    <div class="stat-card glass-premium"><div class="stat-title">⏱️ Total Hours</div><div class="stat-value">${state.enrolledCourses.reduce((s,c)=>s+(c.hoursSpent||0),0)}</div></div>
                    <div class="stat-card glass-premium"><div class="stat-title">📊 Avg Score</div><div class="stat-value">87%</div></div>
                    <div class="stat-card glass-premium"><div class="stat-title">🔥 Streak</div><div class="stat-value">15 days</div></div>
                    <div class="stat-card glass-premium"><div class="stat-title">🌍 Global Rank</div><div class="stat-value">#1,234</div></div>
                </div>
                <div class="stat-card glass-premium" style="max-width:600px;">
                    <h3 style="margin-bottom:20px;">👤 Profile Information</h3>
                    <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">First Name</label><input type="text" id="pFirstName" value="${u.firstName||''}" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.2);"></div>
                    <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">Last Name</label><input type="text" id="pLastName" value="${u.lastName||''}" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.2);"></div>
                    <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">Email</label><input type="email" value="${u.email||''}" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.2);" disabled></div>
                    <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">Phone</label><input type="tel" id="pPhone" value="${u.phone||''}" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.2);"></div>
                    <button class="btn-primary" onclick="updateProfile()">Update Profile</button>
                    <button class="btn-primary btn-outline" style="margin-left:12px;" onclick="openChangePassword()">Change Password</button>
                </div>
            `;
        }

        // ============================================================
        //  ACTION HANDLERS
        // ============================================================
        window.askAI = function(question) {
            const input = document.getElementById('aiQuestion');
            const q = question || input?.value;
            if (!q) return;
            const resp = document.getElementById('aiResponse');
            resp.style.display = 'block';
            resp.innerHTML = '<div class="loading-spinner" style="margin:12px auto;"></div><p style="text-align:center;">Thinking...</p>';
            setTimeout(() => {
                resp.innerHTML = `
                    <strong>You:</strong> ${q}<br><br>
                    <strong>AI Tutor:</strong> Great question! Based on your progress in ${state.enrolledCourses.map(c=>c.title).join(', ')}, 
                    I recommend focusing on completing one module per week. Would you like a personalized study plan?
                `;
            }, 1000);
            if (input) input.value = '';
        };

        window.openChat = function(type, id, name) {
            showToast(`Opening chat with ${name}...`, 'info');
            openModal('💬 Chat', `
                <div style="display:flex;flex-direction:column;height:400px;">
                    <div class="chat-messages-area" id="chatMessages">
                        <div class="message received"><div class="bubble">Hello! How can I help you today?</div></div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="chatInput" placeholder="Type a message..." style="flex:1;padding:12px;border:1px solid var(--border);border-radius:40px;background:rgba(255,255,255,0.2);">
                        <button class="btn-primary" onclick="sendChatMessage()">Send</button>
                    </div>
                </div>
            `);
        };

        window.sendChatMessage = function() {
            const input = document.getElementById('chatInput');
            const msg = input?.value;
            if (!msg) return;
            const area = document.getElementById('chatMessages');
            area.innerHTML += `<div class="message sent"><div class="bubble">${msg}</div></div>`;
            input.value = '';
            area.scrollTop = area.scrollHeight;
            setTimeout(() => {
                area.innerHTML += `<div class="message received"><div class="bubble">Thanks! I'll get back to you soon.</div></div>`;
                area.scrollTop = area.scrollHeight;
            }, 800);
        };

        window.openNewMessageModal = function() {
            openModal('✉️ New Message', `
                <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">To</label><select style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);"><option>Select recipient</option><option>Instructor</option><option>Support</option></select></div>
                <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">Message</label><textarea rows="4" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);" placeholder="Type your message..."></textarea></div>
                <button class="btn-primary" onclick="showToast('Message sent!','success');closeModal();">Send</button>
            `);
        };

        window.updateProfile = function() {
            const fn = document.getElementById('pFirstName')?.value;
            const ln = document.getElementById('pLastName')?.value;
            const ph = document.getElementById('pPhone')?.value;
            if (fn) state.user.firstName = fn;
            if (ln) state.user.lastName = ln;
            if (ph) state.user.phone = ph;
            document.getElementById('user-name').textContent = fn || 'Student';
            document.getElementById('userAvatar').textContent = (fn || 'S')[0].toUpperCase();
            showToast('Profile updated!', 'success');
        };

        window.openChangePassword = function() {
            openModal('🔑 Change Password', `
                <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">Current</label><input type="password" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);"></div>
                <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">New</label><input type="password" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);"></div>
                <div class="form-group"><label style="display:block;margin-bottom:6px;font-weight:500;">Confirm</label><input type="password" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);"></div>
                <button class="btn-primary" onclick="showToast('Password changed!','success');closeModal();">Update</button>
            `);
        };

        // ============================================================
        //  NOTIFICATIONS
        // ============================================================
        function loadNotifications() {
            const container = document.getElementById('notifList');
            container.innerHTML = state.notifications.map(n => `
                <div class="notification-item ${n.read ? '' : 'unread'}" onclick="markRead('${n._id}')">
                    <strong>${n.title}</strong>
                    <p>${n.message}</p>
                    <span class="time">${new Date(n.createdAt).toLocaleString()}</span>
                </div>
            `).join('');
        }

        window.markRead = function(id) {
            const n = state.notifications.find(x => x._id === id);
            if (n) { n.read = true;
                updateNotifBadge();
                loadNotifications();
                showToast('Marked as read', 'info'); }
        };

        // ============================================================
        //  PAGE NAVIGATION
        // ============================================================
        async function loadPage(page) {
            const content = document.getElementById('main-content');
            content.innerHTML = '<div style="text-align:center;padding:60px;"><div class="loading-spinner"></div></div>';
            state.currentPage = page;

            setTimeout(() => {
                let html = '';
                switch (page) {
                    case 'overview':
                        html = renderOverview();
                        break;
                    case 'courses':
                        html = renderCourses();
                        break;
                    case 'live-sessions':
                        html = renderLiveSessions();
                        break;
                    case 'community':
                        html = renderCommunity();
                        break;
                    case 'messages':
                        html = renderMessages();
                        break;
                    case 'certificates':
                        html = renderCertificates();
                        break;
                    case 'ai-tutor':
                        html = renderAITutor();
                        break;
                    case 'profile':
                        html = renderProfile();
                        break;
                    default:
                        html = renderOverview();
                }
                content.innerHTML = html;
                observeCounters();
            }, 300);

            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('data-page') === page);
            });
        }

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            if (!checkAuth()) return;

            await loadPage('overview');
            loadNotifications();

            // Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('user');
                window.location.href = '/';
            });

            // Notifications panel
            document.getElementById('notifBtn').addEventListener('click', () => {
                document.getElementById('notifPanel').classList.toggle('open');
                loadNotifications();
            });
            document.getElementById('closeNotif').addEventListener('click', () => {
                document.getElementById('notifPanel').classList.remove('open');
            });

            // Modal
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            // Mobile menu
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });

            // Sidebar links
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = link.getAttribute('data-page');
                    loadPage(page);
                    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                });
            });

            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });

            // Global search
            document.getElementById('globalSearch').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const val = e.target.value.trim();
                    if (val) showToast(`Searching for "${val}"...`, 'info');
                }
            });
        }

        init();
    </script>
</body>
</html>

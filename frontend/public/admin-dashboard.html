<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - THE BOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --secondary: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
            --dark-bg: #0f172a;
            --dark-text: #e2e8f0;
            --dark-card: rgba(30, 41, 59, 0.8);
            --dark-border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            line-height: 1.6;
            background-attachment: fixed;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--dark-text);
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        body.dark-mode .glass {
            background: var(--dark-card);
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.dark-mode .header {
            background: rgba(15, 23, 42, 0.95);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .admin-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            font-weight: 600;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        .logout-btn {
            padding: 8px 20px;
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 24px;
            position: fixed;
            height: calc(100vh - 73px);
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: rgba(15, 23, 42, 0.9);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        body.dark-mode .sidebar-link {
            color: var(--dark-text);
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--shadow-glow);
            transform: translateX(5px);
        }

        .sidebar-link i {
            width: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 32px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .stat-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .stat-title {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }

        .stat-change.up { color: var(--success); }
        .stat-change.down { color: var(--danger); }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .chart-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        canvas {
            max-height: 300px;
        }

        /* Tables */
        .table-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 24px;
        }

        body.dark-mode .table-container {
            background: rgba(30, 41, 59, 0.8);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            font-weight: 600;
            color: var(--primary);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge.active { background: var(--success); color: white; }
        .badge.inactive { background: var(--danger); color: white; }
        .badge.pending { background: var(--warning); color: white; }
        .badge.approved { background: var(--success); color: white; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            margin: 0 4px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        .action-btn.edit { color: var(--primary); }
        .action-btn.delete { color: var(--danger); }
        .action-btn.view { color: var(--success); }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-primary {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-outline {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .modal-content {
            background: rgba(30, 41, 59, 0.95);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-light);
            font-family: inherit;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 150;
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            <div>
                <a href="/" class="logo">THE BOX</a>
                <span class="admin-badge">Admin</span>
            </div>
            <div class="user-info">
                <span class="user-name" id="user-name">Admin</span>
                <button class="btn-icon" id="theme-toggle">🌙</button>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="overview"><i class="fas fa-tachometer-alt"></i> Overview</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="users"><i class="fas fa-users"></i> Users</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="courses"><i class="fas fa-book"></i> Courses</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="instructors"><i class="fas fa-chalkboard-user"></i> Instructors</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="certificates"><i class="fas fa-certificate"></i> Certificates</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="payments"><i class="fas fa-credit-card"></i> Payments</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="reports"><i class="fas fa-chart-line"></i> Reports</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="settings"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main-content" id="main-content">
            <div style="text-align: center; padding: 60px;">
                <div class="loading-spinner"></div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title">Modal Title</span>
                <button id="close-modal" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // ============================================
        // MOCK DATA
        // ============================================
        let adminData = {
            user: { firstName: 'Admin', lastName: 'User', email: 'admin@thebox.edu', role: 'admin' },
            stats: {
                totalUsers: 15234,
                totalStudents: 14892,
                totalInstructors: 342,
                totalCourses: 456,
                activeCourses: 389,
                totalRevenue: 125680,
                monthlyRevenue: 28450,
                certificatesIssued: 5678
            },
            users: [
                { id: 1, name: 'John Doe', email: 'john@example.com', role: 'student', status: 'active', joined: '2025-01-15', courses: 3 },
                { id: 2, name: 'Jane Smith', email: 'jane@example.com', role: 'student', status: 'active', joined: '2025-02-01', courses: 5 },
                { id: 3, name: 'Mike Johnson', email: 'mike@example.com', role: 'instructor', status: 'active', joined: '2024-11-10', courses: 8 },
                { id: 4, name: 'Sarah Williams', email: 'sarah@example.com', role: 'student', status: 'inactive', joined: '2025-01-20', courses: 1 },
                { id: 5, name: 'David Brown', email: 'david@example.com', role: 'instructor', status: 'pending', joined: '2025-02-10', courses: 0 }
            ],
            courses: [
                { id: 1, title: 'Machine Learning Fundamentals', instructor: 'Dr. Sarah Johnson', students: 1234, price: 0, status: 'published', createdAt: '2025-01-10' },
                { id: 2, title: 'Web Development Bootcamp', instructor: 'Mark Thompson', students: 2345, price: 0, status: 'published', createdAt: '2025-01-15' },
                { id: 3, title: 'Data Science Essentials', instructor: 'Dr. Alex Chen', students: 987, price: 0, status: 'published', createdAt: '2025-01-20' },
                { id: 4, title: 'Advanced Python', instructor: 'Prof. James Wilson', students: 0, price: 49, status: 'draft', createdAt: '2025-02-01' }
            ],
            pendingCourses: [
                { id: 5, title: 'Cloud Computing Basics', instructor: 'Dr. Lisa Zhang', price: 79, submittedAt: '2025-02-14' }
            ],
            certificates: [
                { id: 1, student: 'John Doe', course: 'Web Development Bootcamp', type: 'mastering', issuedAt: '2025-02-01', status: 'verified' },
                { id: 2, student: 'Jane Smith', course: 'Machine Learning Fundamentals', type: 'essential', issuedAt: '2025-01-28', status: 'verified' },
                { id: 3, student: 'Mike Johnson', course: 'Data Science Essentials', type: 'diploma', issuedAt: '2025-01-25', status: 'pending' }
            ],
            payments: [
                { id: 1, user: 'John Doe', amount: 75, type: 'certificate', status: 'completed', date: '2025-02-01' },
                { id: 2, user: 'Jane Smith', amount: 100, type: 'certificate', status: 'completed', date: '2025-01-28' },
                { id: 3, user: 'Mike Johnson', amount: 150, type: 'diploma', status: 'pending', date: '2025-01-25' }
            ]
        };

        let state = {
            currentPage: 'overview',
            charts: {}
        };

        // ============================================
        // AUTHENTICATION
        // ============================================
        function checkAuth() {
            const token = localStorage.getItem('accessToken');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                window.location.href = '/';
                return false;
            }
            
            if (user.role !== 'admin' && user.role !== 'super-admin') {
                window.location.href = '/student-dashboard.html';
                return false;
            }
            
            document.getElementById('user-name').textContent = `${user.firstName || 'Admin'}`;
            return true;
        }

        // ============================================
        // UI HELPERS
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#3b82f6';
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${bgColor};
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                z-index: 1000;
                animation: fadeInUp 0.3s ease;
                font-weight: 500;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openModal(title, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderOverview() {
            const s = adminData.stats;
            
            setTimeout(() => {
                // Revenue Chart
                const ctx1 = document.getElementById('revenueChart')?.getContext('2d');
                if (ctx1 && state.charts.revenue) state.charts.revenue.destroy();
                if (ctx1) {
                    state.charts.revenue = new Chart(ctx1, {
                        type: 'line',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                            datasets: [{
                                label: 'Revenue ($)',
                                data: [12500, 18900, 22400, 27800, 31200, 28450],
                                borderColor: '#2563eb',
                                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                }
                
                // Enrollment Chart
                const ctx2 = document.getElementById('enrollmentChart')?.getContext('2d');
                if (ctx2 && state.charts.enrollment) state.charts.enrollment.destroy();
                if (ctx2) {
                    state.charts.enrollment = new Chart(ctx2, {
                        type: 'bar',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                            datasets: [{
                                label: 'New Students',
                                data: [450, 680, 890, 1200, 1450, 1320],
                                backgroundColor: '#2563eb',
                                borderRadius: 8
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                }
            }, 100);
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Total Users</div><div class="stat-value">${s.totalUsers.toLocaleString()}</div><div class="stat-change up">↑ 12% from last month</div></div>
                    <div class="stat-card"><div class="stat-title">Students</div><div class="stat-value">${s.totalStudents.toLocaleString()}</div><div class="stat-change up">↑ 8% from last month</div></div>
                    <div class="stat-card"><div class="stat-title">Instructors</div><div class="stat-value">${s.totalInstructors.toLocaleString()}</div><div class="stat-change up">↑ 5 from last month</div></div>
                    <div class="stat-card"><div class="stat-title">Active Courses</div><div class="stat-value">${s.activeCourses}</div><div class="stat-change up">↑ 15 new this month</div></div>
                    <div class="stat-card"><div class="stat-title">Total Revenue</div><div class="stat-value">$${s.totalRevenue.toLocaleString()}</div><div class="stat-change up">↑ 23% from last month</div></div>
                    <div class="stat-card"><div class="stat-title">Certificates Issued</div><div class="stat-value">${s.certificatesIssued.toLocaleString()}</div><div class="stat-change up">↑ 345 this month</div></div>
                </div>
                
                <div class="charts-grid">
                    <div class="chart-card"><div class="chart-title">Revenue Overview</div><canvas id="revenueChart"></canvas></div>
                    <div class="chart-card"><div class="chart-title">Student Enrollment</div><canvas id="enrollmentChart"></canvas></div>
                </div>
                
                <div class="table-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Recent Users</h3>
                        <button class="btn-primary btn-outline" onclick="loadPage('users')">View All</button>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${adminData.users.slice(0, 5).map(user => `
                                <tr>
                                    <td>${user.name}</td><td>${user.email}</td><td>${user.role}</td>
                                    <td><span class="badge ${user.status === 'active' ? 'active' : user.status === 'pending' ? 'pending' : 'inactive'}">${user.status}</span></td>
                                    <td>${user.joined}</td>
                                    <td><button class="action-btn edit" onclick="editUser(${user.id})"><i class="fas fa-edit"></i></button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <div class="table-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Pending Course Approvals</h3>

        // ============================================

        window.editUser = (id) => {

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        async function loadPage(page) {
            const content = document.getElementById('main-content');
            content.innerHTML = '<div style="text-align: center; padding: 60px;"><div class="loading-spinner"></div></div>';
            
            state.currentPage = page;
            
            setTimeout(() => {
                let html = '';
                switch(page) {
                    case 'overview': html = renderOverview(); break;
                    case 'users': html = renderUsers(); break;
                    case 'courses': html = renderCourses(); break;
                    case 'instructors': html = renderInstructors(); break;
                    case 'certificates': html = renderCertificates(); break;
                    case 'payments': html = renderPayments(); break;
                    case 'reports': html = renderReports(); break;
                    case 'settings': html = renderSettings(); break;
                    default: html = renderOverview();
                }
                content.innerHTML = html;
                
                // Re-initialize charts if on overview page
                if (page === 'overview' || page === 'reports') {
                    setTimeout(() => {
                        if (page === 'reports') {
                            const ctx = document.getElementById('revenueReportChart')?.getContext('2d');
                            if (ctx) new Chart(ctx, {
                                type: 'line',
                                data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], datasets: [{ label: 'Revenue', data: [12500, 18900, 22400, 27800, 31200, 28450], borderColor: '#2563eb' }] }
                            });
                            const ctx2 = document.getElementById('userGrowthChart')?.getContext('2d');
                            if (ctx2) new Chart(ctx2, {
                                type: 'bar',
                                data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], datasets: [{ label: 'New Users', data: [450, 680, 890, 1200, 1450, 1320], backgroundColor: '#2563eb' }] }
                            });
                        }
                    }, 100);
                }
            }, 300);
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-page') === page) {
                    link.classList.add('active');
                }
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            if (!checkAuth()) return;
            await loadPage('overview');
            
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
            
            document.getElementById('close-modal').addEventListener('click', closeModal);
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = link.getAttribute('data-page');
                    loadPage(page);
                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                });
            });
            
            const themeToggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });
        }
        
        init();
    </script>

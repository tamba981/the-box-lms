<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - THE BOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --secondary: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
            --dark-bg: #0f172a;
            --dark-text: #e2e8f0;
            --dark-card: rgba(30, 41, 59, 0.8);
            --dark-border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            line-height: 1.6;
            background-attachment: fixed;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--dark-text);
        }

        /* Glassmorphism Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        body.dark-mode .glass {
            background: var(--dark-card);
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.dark-mode .header {
            background: rgba(15, 23, 42, 0.95);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            font-weight: 600;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        .logout-btn {
            padding: 8px 20px;
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: calc(100vh - 73px);
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 24px;
            position: fixed;
            height: calc(100vh - 73px);
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: rgba(15, 23, 42, 0.9);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        body.dark-mode .sidebar-link {
            color: var(--dark-text);
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--shadow-glow);
            transform: translateX(5px);
        }

        .sidebar-link i {
            width: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 32px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .stat-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .stat-title {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Courses Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .course-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .course-image {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .course-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .course-badge.in-progress { background: var(--warning); color: white; }
        .course-badge.completed { background: var(--success); color: white; }
        .course-badge.new { background: var(--primary); color: white; }

        .course-content {
            padding: 20px;
        }

        .course-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .course-progress {
            margin: 16px 0;
        }

        .progress-bar {
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .btn-primary {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-outline {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        /* Notifications Panel */
        .notifications-panel {
            position: fixed;
            top: 73px;
            right: -400px;
            width: 380px;
            height: calc(100vh - 73px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 200;
            transition: right 0.3s;
            overflow-y: auto;
        }

        body.dark-mode .notifications-panel {
            background: rgba(15, 23, 42, 0.95);
        }

        .notifications-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .modal-content {
            background: rgba(30, 41, 59, 0.95);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 150;
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            <a href="/" class="logo">THE BOX</a>
            <div class="user-info">
                <button class="notification-bell" id="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notification-count">0</span>
                </button>
                <span class="user-name" id="user-name">Student</span>
                <button class="btn-icon" id="theme-toggle">🌙</button>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="overview"><i class="fas fa-tachometer-alt"></i> Overview</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="courses"><i class="fas fa-book"></i> My Courses</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="live-sessions"><i class="fas fa-video"></i> Live Sessions</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="community"><i class="fas fa-users"></i> Community</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="messages"><i class="fas fa-envelope"></i> Messages</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="certificates"><i class="fas fa-certificate"></i> Certificates</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="ai-tutor"><i class="fas fa-robot"></i> AI Tutor</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="profile"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
        </aside>

        <main class="main-content" id="main-content">
            <div style="text-align: center; padding: 60px;">
                <div class="loading-spinner"></div>
            </div>
        </main>
    </div>

    <!-- Notifications Panel -->
    <div class="notifications-panel" id="notifications-panel">
        <div class="panel-header">
            <span>Notifications</span>
            <button id="close-notifications" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
        </div>
        <div id="notifications-list"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="panel-header">
                <span id="modal-title">Modal Title</span>
                <button id="close-modal" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
            </div>
            <div class="modal-body" id="modal-body" style="padding: 20px;"></div>
        </div>
    </div>

    <script>
        // ============================================
        // MOCK DATA
        // ============================================
        const MOCK_COURSES = [
            {
                _id: 'course1',
                title: 'Machine Learning Fundamentals',
                description: 'Learn the core concepts of Machine Learning with practical examples and hands-on projects.',
                thumbnail: 'https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=400&h=160&fit=crop',
                progress: 75,
                hoursSpent: 24,
                certificateIssued: false,
                instructorId: 'inst1',
                instructorName: 'Dr. Sarah Johnson'
            },
            {
                _id: 'course2',
                title: 'Web Development Bootcamp',
                description: 'Master HTML, CSS, JavaScript, React, and Node.js to become a full-stack developer.',
                thumbnail: 'https://images.unsplash.com/photo-1581276879432-15e50529f34b?w=400&h=160&fit=crop',
                progress: 100,
                hoursSpent: 45,
                certificateIssued: true,
                certificateId: 'cert1',
                certificateIssuedDate: '2025-01-15',
                instructorId: 'inst2',
                instructorName: 'Mark Thompson'
            },
            {
                _id: 'course3',
                title: 'Data Science Essentials',
                description: 'Transform data into actionable insights using Python, Pandas, and visualization tools.',
                thumbnail: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&h=160&fit=crop',
                progress: 30,
                hoursSpent: 12,
                certificateIssued: false,
                instructorId: 'inst3',
                instructorName: 'Dr. Alex Chen'
            }
        ];

        const MOCK_RECOMMENDED = [
            {
                _id: 'rec1',
                title: 'Advanced Python Programming',
                description: 'Take your Python skills to the next level with advanced concepts and design patterns.',
                thumbnail: 'https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=400&h=160&fit=crop'
            },
            {
                _id: 'rec2',
                title: 'Cloud Computing with AWS',
                description: 'Learn to deploy and manage applications on Amazon Web Services.',
                thumbnail: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400&h=160&fit=crop'
            }
        ];

        const MOCK_NOTIFICATIONS = [
            { _id: 'notif1', title: 'New Assignment', message: 'Machine Learning Quiz is due in 2 days', createdAt: new Date().toISOString(), read: false },
            { _id: 'notif2', title: 'Live Session', message: 'Web Development Bootcamp live session today at 3 PM', createdAt: new Date(Date.now() - 86400000).toISOString(), read: false },
            { _id: 'notif3', title: 'Certificate Ready', message: 'Your Web Development certificate is ready to download', createdAt: new Date(Date.now() - 172800000).toISOString(), read: true }
        ];

        const MOCK_LIVE_SESSIONS = [
            { _id: 'live1', title: 'React Hooks Deep Dive', courseTitle: 'Web Development Bootcamp', startTime: new Date(Date.now() + 3600000), endTime: new Date(Date.now() + 7200000), meetingLink: 'https://meet.google.com/abc-def-ghi' },
            { _id: 'live2', title: 'Neural Networks Explained', courseTitle: 'Machine Learning Fundamentals', startTime: new Date(Date.now() + 86400000), endTime: new Date(Date.now() + 90000000), meetingLink: 'https://meet.google.com/jkl-mno-pqr' }
        ];

        const MOCK_RECORDINGS = [
            { _id: 'rec1', title: 'Introduction to ML', courseTitle: 'Machine Learning Fundamentals', endTime: new Date(Date.now() - 86400000), recordingUrl: '#' },
            { _id: 'rec2', title: 'HTML & CSS Basics', courseTitle: 'Web Development Bootcamp', endTime: new Date(Date.now() - 172800000), recordingUrl: '#' }
        ];

        const MOCK_DEADLINES = [
            { id: 1, title: 'Machine Learning Quiz', dueDate: new Date(Date.now() + 2 * 86400000) },
            { id: 2, title: 'Web Development Project', dueDate: new Date(Date.now() + 5 * 86400000) }
        ];

        const MOCK_STUDY_GROUPS = [
            { id: 'sg1', name: 'Machine Learning Study Group', members: 45, activeTopics: 12 },
            { id: 'sg2', name: 'Web Dev Project Team', members: 23, activeTopics: 8 }
        ];

        const MOCK_CONVERSATIONS = [
            { type: 'instructor', id: 'inst1', name: 'Dr. Sarah Johnson', lastMessage: 'Great progress on your assignment!', time: '2h ago', unread: true },
            { type: 'group', id: 'sg1', name: 'ML Study Group', lastMessage: 'Anyone working on the quiz?', time: '5h ago', unread: false }
        ];

        // ============================================
        // STATE
        // ============================================
        let state = {
            user: null,
            token: null,
            enrolledCourses: [...MOCK_COURSES],
            recommendedCourses: [...MOCK_RECOMMENDED],
            notifications: [...MOCK_NOTIFICATIONS],
            liveSessions: [...MOCK_LIVE_SESSIONS],
            recordings: [...MOCK_RECORDINGS],
            deadlines: [...MOCK_DEADLINES],
            studyGroups: [...MOCK_STUDY_GROUPS],
            conversations: [...MOCK_CONVERSATIONS],
            currentPage: 'overview'
        };

        // ============================================
        // AUTHENTICATION
        // ============================================
        function checkAuth() {
            const token = localStorage.getItem('accessToken');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                window.location.href = '/';
                return false;
            }
            
            state.token = token;
            state.user = user;
            document.getElementById('user-name').textContent = user.firstName || 'Student';
            updateNotificationBadge();
            return true;
        }

        function updateNotificationBadge() {
            const unreadCount = state.notifications.filter(n => !n.read).length;
            document.getElementById('notification-count').textContent = unreadCount;
        }

        // ============================================
        // UI HELPERS
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#3b82f6';
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${bgColor};
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                z-index: 1000;
                animation: fadeInUp 0.3s ease;
                font-weight: 500;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openModal(title, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderOverview() {
            const totalCourses = state.enrolledCourses.length;
            const completedCourses = state.enrolledCourses.filter(c => c.progress === 100).length;
            const totalHours = state.enrolledCourses.reduce((sum, c) => sum + (c.hoursSpent || 0), 0);
            const certificatesEarned = state.enrolledCourses.filter(c => c.certificateIssued).length;
            const inProgressCourses = state.enrolledCourses.filter(c => c.progress > 0 && c.progress < 100);
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Courses Enrolled</div><div class="stat-value">${totalCourses}</div></div>
                    <div class="stat-card"><div class="stat-title">Completed Courses</div><div class="stat-value">${completedCourses}</div></div>
                    <div class="stat-card"><div class="stat-title">Hours Learned</div><div class="stat-value">${totalHours}</div></div>
                    <div class="stat-card"><div class="stat-title">Certificates Earned</div><div class="stat-value">${certificatesEarned}</div></div>
                </div>
                
                <div class="section-title">
                    <span>Continue Learning</span>
                </div>
                <div class="courses-grid">
                    ${inProgressCourses.length > 0 ? inProgressCourses.map(course => `
                        <div class="course-card">
                            <div class="course-image" style="background-image: url('${course.thumbnail}')">
                                <span class="course-badge in-progress">${course.progress}%</span>
                            </div>
                            <div class="course-content">
                                <h3 class="course-title">${course.title}</h3>
                                <p>${course.description}</p>
                                <div class="course-progress">
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${course.progress}%"></div></div>
                                    <span style="font-size: 13px;">${course.progress}% Complete</span>
                                </div>
                                <button class="btn-primary" onclick="showToast('Opening ${course.title}...', 'info')">Continue Learning →</button>
                            </div>
                        </div>
                    `).join('') : `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-book-open"></i>
                            <h3>No courses in progress</h3>
                            <p>Enroll in a course to start your learning journey</p>
                            <button class="btn-primary" onclick="loadPage('courses')">Browse Courses</button>
                        </div>
                    `}
                </div>
                
                <div class="section-title">
                    <span>Upcoming Deadlines</span>
                </div>
                <div class="stats-grid">
                    ${state.deadlines.map(deadline => `
                        <div class="stat-card">
                            <div class="stat-title">${deadline.title}</div>
                            <div class="stat-value" style="font-size: 18px;">Due: ${new Date(deadline.dueDate).toLocaleDateString()}</div>
                            <button class="btn-primary" style="margin-top: 12px;" onclick="showToast('Opening assignment...', 'info')">View →</button>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section-title">
                    <span>Recommended For You</span>
                </div>
                <div class="courses-grid">
                    ${state.recommendedCourses.map(course => `
                        <div class="course-card">
                            <div class="course-image" style="background-image: url('${course.thumbnail}')">
                                <span class="course-badge new">NEW</span>
                            </div>
                            <div class="course-content">
                                <h3 class="course-title">${course.title}</h3>
                                <p>${course.description}</p>
                                <button class="btn-primary" onclick="showToast('Enrolled in ${course.title}!', 'success')">Enroll Now →</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCourses() {
            if (state.enrolledCourses.length === 0) {
                return `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <h3>No courses enrolled yet</h3>
                        <p>Browse our catalog and start your learning journey today</p>
                        <button class="btn-primary" onclick="loadPage('courses')">Browse Courses</button>
                    </div>
                `;
            }
            
            return `
                <div class="section-title">
                    <span>My Courses (${state.enrolledCourses.length})</span>
                </div>
                <div class="courses-grid">
                    ${state.enrolledCourses.map(course => `
                        <div class="course-card">
                            <div class="course-image" style="background-image: url('${course.thumbnail}')">
                                <span class="course-badge ${course.progress === 100 ? 'completed' : 'in-progress'}">${course.progress === 100 ? 'Completed' : course.progress + '%'}</span>
                            </div>
                            <div class="course-content">
                                <h3 class="course-title">${course.title}</h3>
                                <p>${course.description}</p>
                                <div class="course-progress">
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${course.progress}%"></div></div>
                                </div>
                                <button class="btn-primary" onclick="showToast('Opening ${course.title}...', 'info')">${course.progress === 100 ? 'Review Course →' : 'Continue →'}</button>
                                <button class="btn-primary btn-outline" style="margin-left: 10px;" onclick="showToast('Opening community for ${course.title}', 'info')"><i class="fas fa-users"></i> Community</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div style="text-align: center; margin-top: 24px;">
                    <button class="btn-primary btn-outline" onclick="showToast('Redirecting to course catalog...', 'info')">Browse More Courses →</button>
                </div>
            `;
        }

        function renderLiveSessions() {
            const upcoming = state.liveSessions.filter(s => new Date(s.startTime) > new Date());
            const past = state.recordings;
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Upcoming Sessions</div><div class="stat-value">${upcoming.length}</div></div>
                    <div class="stat-card"><div class="stat-title">Recorded Sessions</div><div class="stat-value">${past.length}</div></div>
                    <div class="stat-card"><div class="stat-title">Attendance Rate</div><div class="stat-value">85%</div></div>
                </div>
                
                <div class="section-title">Upcoming Live Classes</div>
                ${upcoming.length > 0 ? upcoming.map(session => `
                    <div class="stat-card" style="margin-bottom: 16px;">
                        <div class="stat-title">${session.title}</div>
                        <div class="stat-value" style="font-size: 18px;">📅 ${new Date(session.startTime).toLocaleString()}</div>
                        <p>Course: ${session.courseTitle}</p>
                        <button class="btn-primary" onclick="window.open('${session.meetingLink}', '_blank')">Join Session →</button>
                        <button class="btn-primary btn-outline" style="margin-left: 10px;" onclick="showToast('Reminder set for this session!', 'success')">Set Reminder</button>
                    </div>
                `).join('') : `
                    <div class="empty-state">
                        <i class="fas fa-calendar-alt"></i>
                        <h3>No upcoming live sessions</h3>
                        <p>Check back later for scheduled sessions</p>
                    </div>
                `}
                
                <div class="section-title">Recorded Sessions</div>
                <div class="courses-grid">
                    ${past.map(session => `
                        <div class="course-card">
                            <div class="course-content">
                                <h3 class="course-title">${session.title}</h3>
                                <p>${session.courseTitle}</p>
                                <p style="font-size: 13px; color: var(--text-light);">Recorded: ${new Date(session.endTime).toLocaleDateString()}</p>
                                <button class="btn-primary" onclick="showToast('Opening recording...', 'info')">Watch Recording →</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCommunity() {
            return `
                <div class="section-title">Course Communities</div>
                <div class="courses-grid">
                    ${state.enrolledCourses.map(course => `
                        <div class="course-card">
                            <div class="course-content">
                                <h3 class="course-title">${course.title}</h3>
                                <p>Join discussions with fellow students</p>
                                <button class="btn-primary" onclick="showToast('Opening ${course.title} community...', 'info')">Join Discussion →</button>
                                <button class="btn-primary btn-outline" style="margin-left: 10px;" onclick="openChat('instructor', '${course.instructorId}', '${course.instructorName}')">Message Instructor</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section-title">Study Groups</div>
                <div class="courses-grid">
                    ${state.studyGroups.map(group => `
                        <div class="course-card">
                            <div class="course-content">
                                <h3 class="course-title">${group.name}</h3>
                                <p>${group.members} members • ${group.activeTopics} active topics</p>
                                <button class="btn-primary" onclick="openChat('group', '${group.id}', '${group.name}')">Join Group →</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderMessages() {
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Unread Messages</div><div class="stat-value">${state.conversations.filter(c => c.unread).length}</div></div>
                    <div class="stat-card"><div class="stat-title">Instructors</div><div class="stat-value">${state.enrolledCourses.length}</div></div>
                    <div class="stat-card"><div class="stat-title">Study Groups</div><div class="stat-value">${state.studyGroups.length}</div></div>
                </div>
                
                <div class="section-title">Recent Conversations</div>
                ${state.conversations.map(conv => `
                    <div class="stat-card" style="margin-bottom: 12px; cursor: pointer;" onclick="openChat('${conv.type}', '${conv.id}', '${conv.name}')">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${conv.name}</strong>
                            <span style="font-size: 12px; color: var(--text-light);">${conv.time}</span>
                        </div>
                        <div style="font-size: 14px;">${conv.lastMessage}</div>
                        ${conv.unread ? '<span style="background: var(--primary); color: white; padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-top: 8px; display: inline-block;">New</span>' : ''}
                    </div>
                `).join('')}
                
                <div style="margin-top: 24px;">
                    <button class="btn-primary" onclick="openNewMessageModal()">+ New Message</button>
                </div>
            `;
        }

        function renderCertificates() {
            const earnedCertificates = state.enrolledCourses.filter(c => c.certificateIssued);
            
            if (earnedCertificates.length === 0) {
                return `
                    <div class="empty-state">
                        <i class="fas fa-certificate"></i>
                        <h3>No certificates yet</h3>
                        <p>Complete courses to earn blockchain-verified certificates</p>
                        <button class="btn-primary" onclick="loadPage('courses')">View My Courses</button>
                    </div>
                `;
            }
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Total Earned</div><div class="stat-value">${earnedCertificates.length}</div></div>
                    <div class="stat-card"><div class="stat-title">Blockchain Verified</div><div class="stat-value">${earnedCertificates.length}</div></div>
                </div>
                
                <div class="courses-grid">
                    ${earnedCertificates.map(cert => `
                        <div class="course-card">
                            <div class="course-content" style="text-align: center;">
                                <i class="fas fa-certificate" style="font-size: 56px; color: var(--primary); margin-bottom: 16px;"></i>
                                <h3 class="course-title">${cert.title}</h3>
                                <p>Issued: ${new Date(cert.certificateIssuedDate).toLocaleDateString()}</p>
                                <div style="display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; padding: 6px 12px; background: rgba(37,99,235,0.1); border-radius: 20px;">
                                    <i class="fas fa-link"></i> Blockchain Verified
                                </div>
                                <button class="btn-primary" style="margin-top: 16px;" onclick="showToast('Downloading certificate...', 'success')">Download PDF</button>
                                <button class="btn-primary btn-outline" onclick="showToast('Share on LinkedIn coming soon!', 'info')">Share on LinkedIn</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderAITutor() {
            return `
                <div class="stat-card" style="padding: 40px; text-align: center;">
                    <i class="fas fa-robot" style="font-size: 72px; color: var(--primary); margin-bottom: 20px;"></i>
                    <h2 class="section-title" style="justify-content: center;">AI Tutor Assistant</h2>
                    <p style="margin-bottom: 24px;">Ask me anything about your courses! I'm here 24/7 to help you learn.</p>
                    <div style="display: flex; gap: 12px; max-width: 500px; margin: 0 auto;">
                        <input type="text" id="ai-question" placeholder="Ask a question..." style="flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg-light); font-size: 14px;">
                        <button class="btn-primary" onclick="askAI()" style="border: none; padding: 14px 24px;">Send</button>
                    </div>
                    <div id="ai-response" style="margin-top: 24px; padding: 20px; background: rgba(37,99,235,0.1); border-radius: 16px; text-align: left; display: none;"></div>
                </div>
                
                <div class="section-title">Quick Questions</div>
                <div class="stats-grid">
                    <div class="stat-card" style="cursor: pointer;" onclick="askAI('What is the deadline for my assignments?')">
                        <i class="fas fa-calendar"></i> Assignment deadlines
                    </div>
                    <div class="stat-card" style="cursor: pointer;" onclick="askAI('Can you explain this concept?')">
                        <i class="fas fa-graduation-cap"></i> Explain concepts
                    </div>
                    <div class="stat-card" style="cursor: pointer;" onclick="askAI('How am I performing in my courses?')">
                        <i class="fas fa-chart-line"></i> My performance
                    </div>
                </div>
            `;
        }

        function renderProfile() {
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Total Learning Time</div><div class="stat-value">${state.enrolledCourses.reduce((sum, c) => sum + (c.hoursSpent || 0), 0)} hrs</div></div>
                    <div class="stat-card"><div class="stat-title">Average Score</div><div class="stat-value">87%</div></div>
                    <div class="stat-card"><div class="stat-title">Learning Streak</div><div class="stat-value">15 days</div></div>
                    <div class="stat-card"><div class="stat-title">Global Rank</div><div class="stat-value">#1,234</div></div>
                </div>
                
                <div class="stat-card" style="max-width: 600px;">
                    <h3 style="margin-bottom: 20px;">Profile Information</h3>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">First Name</label>
                        <input type="text" id="profile-firstname" value="${state.user.firstName || ''}" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-light);">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Last Name</label>
                        <input type="text" id="profile-lastname" value="${state.user.lastName || ''}" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-light);">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                        <input type="email" value="${state.user.email || ''}" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-light);" disabled>
                    </div>
                    <div style="margin-bottom: 24px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Phone</label>
                        <input type="tel" id="profile-phone" value="${state.user.phone || ''}" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-light);">
                    </div>
                    <button class="btn-primary" onclick="updateProfile()">Update Profile</button>
                    <button class="btn-primary btn-outline" style="margin-left: 12px;" onclick="openChangePasswordModal()">Change Password</button>
                </div>
            `;
        }

        // ============================================
        // ACTION HANDLERS
        // ============================================
        window.askAI = function(question) {
            const input = document.getElementById('ai-question');
            const questionText = question || input?.value;
            if (!questionText) return;
            
            const responseDiv = document.getElementById('ai-response');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = '<div class="loading-spinner" style="margin: 20px auto;"></div><p style="text-align: center;">Thinking...</p>';
            
            setTimeout(() => {
                responseDiv.innerHTML = `
                    <strong>You asked:</strong> ${questionText}<br><br>
                    <strong>AI Tutor:</strong> Great question! Based on your learning progress in ${state.enrolledCourses.map(c => c.title).join(', ')}, 
                    I recommend focusing on completing one module per week. Would you like me to create a personalized study plan for you?
                `;
            }, 1000);
            
            if (input) input.value = '';
        };

        window.openChat = function(type, id, name) {
            showToast(`Opening chat with ${name}...`, 'info');
            openModal('Chat', `
                <div style="height: 400px; display: flex; flex-direction: column;">
                    <div id="chat-messages-area" style="flex: 1; overflow-y: auto; margin-bottom: 16px; padding: 8px;">
                        <div class="message received" style="margin-bottom: 12px;">
                            <div style="background: rgba(37,99,235,0.1); padding: 10px 14px; border-radius: 12px; display: inline-block; max-width: 80%;">
                                Hello! How can I help you today?
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="chat-message-input" placeholder="Type your message..." style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px;">
                        <button class="btn-primary" onclick="sendChatMessage()">Send</button>
                    </div>
                </div>
            `);
        };

        window.sendChatMessage = function() {
            const input = document.getElementById('chat-message-input');
            const message = input?.value;
            if (!message) return;
            
            const messagesArea = document.getElementById('chat-messages-area');
            messagesArea.innerHTML += `
                <div class="message sent" style="text-align: right; margin-bottom: 12px;">
                    <div style="background: var(--primary); color: white; padding: 10px 14px; border-radius: 12px; display: inline-block; max-width: 80%;">
                        ${message}
                    </div>
                </div>
            `;
            input.value = '';
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            setTimeout(() => {
                messagesArea.innerHTML += `
                    <div class="message received" style="margin-bottom: 12px;">
                        <div style="background: rgba(37,99,235,0.1); padding: 10px 14px; border-radius: 12px; display: inline-block; max-width: 80%;">
                            Thanks for your message! I'll get back to you soon.
                        </div>
                    </div>
                `;
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 1000);
        };

        window.openNewMessageModal = function() {
            openModal('New Message', `
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">To</label>
                    <select id="message-recipient" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;">
                        <option value="">Select recipient</option>
                        <option value="instructor">Course Instructor</option>
                        <option value="support">Support Team</option>
                    </select>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Message</label>
                    <textarea id="message-content" rows="4" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;" placeholder="Type your message..."></textarea>
                </div>
                <button class="btn-primary" onclick="sendNewMessage()">Send Message</button>
            `);
        };

        window.sendNewMessage = function() {
            showToast('Message sent successfully!', 'success');
            closeModal();
        };

        window.updateProfile = function() {
            showToast('Profile updated successfully!', 'success');
        };

        window.openChangePasswordModal = function() {
            openModal('Change Password', `
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Current Password</label>
                    <input type="password" id="current-password" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">New Password</label>
                    <input type="password" id="new-password" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;">
                </div>
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Confirm Password</label>
                    <input type="password" id="confirm-password" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;">
                </div>
                <button class="btn-primary" onclick="changePassword()">Update Password</button>
            `);
        };

        window.changePassword = function() {
            showToast('Password changed successfully!', 'success');
            closeModal();
        };

        // ============================================
        // NOTIFICATIONS
        // ============================================
        function loadNotifications() {
            const container = document.getElementById('notifications-list');
            container.innerHTML = state.notifications.map(notif => `
                <div class="notification-item ${notif.read ? '' : 'unread'}" style="padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="markNotificationRead('${notif._id}')">
                    <strong>${notif.title}</strong>
                    <p style="font-size: 14px; margin-top: 4px;">${notif.message}</p>
                    <span style="font-size: 12px; color: var(--text-light);">${new Date(notif.createdAt).toLocaleString()}</span>
                </div>
            `).join('');
        }

        window.markNotificationRead = function(notificationId) {
            const notification = state.notifications.find(n => n._id === notificationId);
            if (notification) {
                notification.read = true;
                updateNotificationBadge();
                loadNotifications();
                showToast('Notification marked as read', 'info');
            }
        };

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        async function loadPage(page) {
            const content = document.getElementById('main-content');
            content.innerHTML = '<div style="text-align: center; padding: 60px;"><div class="loading-spinner"></div></div>';
            
            state.currentPage = page;
            
            setTimeout(() => {
                let html = '';
                switch(page) {
                    case 'overview': html = renderOverview(); break;
                    case 'courses': html = renderCourses(); break;
                    case 'live-sessions': html = renderLiveSessions(); break;
                    case 'community': html = renderCommunity(); break;
                    case 'messages': html = renderMessages(); break;
                    case 'certificates': html = renderCertificates(); break;
                    case 'ai-tutor': html = renderAITutor(); break;
                    case 'profile': html = renderProfile(); break;
                    default: html = renderOverview();
                }
                content.innerHTML = html;
            }, 300);
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-page') === page) {
                    link.classList.add('active');
                }
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            if (!checkAuth()) return;
            
            await loadPage('overview');
            loadNotifications();
            
            // Event Listeners
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
            
            document.getElementById('notification-bell').addEventListener('click', () => {
                document.getElementById('notifications-panel').classList.add('open');
                loadNotifications();
            });
            
            document.getElementById('close-notifications').addEventListener('click', () => {
                document.getElementById('notifications-panel').classList.remove('open');
            });
            
            document.getElementById('close-modal').addEventListener('click', closeModal);
            
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = link.getAttribute('data-page');
                    loadPage(page);
                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                });
            });
            
            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });
        }
        
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard - THE BOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --secondary: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f9fafb;
            --border: #e5e7eb;
            --dark-bg: #0f172a;
            --dark-text: #e2e8f0;
            --dark-card: rgba(30, 41, 59, 0.8);
            --dark-border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            line-height: 1.6;
            background-attachment: fixed;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--dark-text);
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        body.dark-mode .glass {
            background: var(--dark-card);
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.dark-mode .header {
            background: rgba(15, 23, 42, 0.95);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .instructor-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            font-weight: 600;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 20px;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 18px;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        .logout-btn {
            padding: 8px 20px;
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 24px;
            position: fixed;
            height: calc(100vh - 73px);
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: rgba(15, 23, 42, 0.9);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        body.dark-mode .sidebar-link {
            color: var(--dark-text);
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--shadow-glow);
            transform: translateX(5px);
        }

        .sidebar-link i {
            width: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 32px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .stat-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .stat-title {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }

        .stat-change.up { color: var(--success); }
        .stat-change.down { color: var(--danger); }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Course Cards Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .course-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .course-image {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .course-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .course-badge.published { background: var(--success); color: white; }
        .course-badge.draft { background: var(--warning); color: white; }
        .course-badge.pending { background: var(--danger); color: white; }

        .course-content {
            padding: 20px;
        }

        .course-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .course-meta {
            display: flex;
            gap: 16px;
            margin: 12px 0;
            font-size: 13px;
            color: var(--text-light);
        }

        .btn-primary {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-outline {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Tables */
        .table-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 24px;
        }

        body.dark-mode .table-container {
            background: rgba(30, 41, 59, 0.8);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            font-weight: 600;
            color: var(--primary);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge.active { background: var(--success); color: white; }
        .badge.pending { background: var(--warning); color: white; }
        .badge.completed { background: var(--success); color: white; }
        .badge.in-progress { background: var(--info); color: white; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            margin: 0 4px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        .action-btn.edit { color: var(--primary); }
        .action-btn.delete { color: var(--danger); }
        .action-btn.view { color: var(--success); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .modal-content {
            background: rgba(30, 41, 59, 0.95);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-light);
            font-family: inherit;
        }

        /* Chart Card */
        .chart-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 24px;
        }

        body.dark-mode .chart-card {
            background: rgba(30, 41, 59, 0.8);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        canvas {
            max-height: 300px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 150;
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            <div>
                <a href="/" class="logo">THE BOX</a>
                <span class="instructor-badge">Instructor</span>
            </div>
            <div class="user-info">
                <button class="notification-bell" id="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notification-count">3</span>
                </button>
                <span class="user-name" id="user-name">Instructor</span>
                <button class="btn-icon" id="theme-toggle">🌙</button>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="#" class="sidebar-link active" data-page="overview"><i class="fas fa-tachometer-alt"></i> Overview</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="courses"><i class="fas fa-book"></i> My Courses</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="create-course"><i class="fas fa-plus-circle"></i> Create Course</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="students"><i class="fas fa-users"></i> My Students</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="assignments"><i class="fas fa-tasks"></i> Assignments</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="quizzes"><i class="fas fa-question-circle"></i> Quizzes</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="live-classes"><i class="fas fa-video"></i> Live Classes</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="earnings"><i class="fas fa-chart-line"></i> Earnings</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="messages"><i class="fas fa-envelope"></i> Messages</a></li>
                <li class="sidebar-item"><a href="#" class="sidebar-link" data-page="profile"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
        </aside>

        <main class="main-content" id="main-content">
            <div style="text-align: center; padding: 60px;">
                <div class="loading-spinner"></div>
            </div>
        </main>
    </div>

    <!-- Notifications Panel -->
    <div class="modal" id="notifications-modal" style="align-items: flex-start; justify-content: flex-end;">
        <div class="modal-content" style="max-width: 400px; margin-top: 73px; margin-right: 0;">
            <div class="modal-header">
                <span>Notifications</span>
                <button id="close-notifications" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
            </div>
            <div class="modal-body" id="notifications-list"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title">Modal Title</span>
                <button id="close-modal" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // ============================================
        // MOCK DATA
        // ============================================
        let instructorData = {
            user: { id: 1, firstName: 'Sarah', lastName: 'Johnson', email: 'sarah@thebox.edu', role: 'instructor', avatar: '', bio: 'Expert in Machine Learning and AI with 10+ years of experience' },
            stats: {
                totalStudents: 3421,
                totalCourses: 4,
                publishedCourses: 3,
                totalRevenue: 28450,
                monthlyRevenue: 5620,
                averageRating: 4.8,
                completionRate: 78
            },
            courses: [
                { id: 1, title: 'Machine Learning Fundamentals', description: 'Learn the core concepts of Machine Learning with practical examples.', thumbnail: 'https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=400&h=160&fit=crop', students: 1234, status: 'published', price: 0, rating: 4.8, createdAt: '2025-01-10' },
                { id: 2, title: 'Advanced Machine Learning', description: 'Deep dive into neural networks, deep learning, and advanced ML algorithms.', thumbnail: 'https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?w=400&h=160&fit=crop', students: 567, status: 'published', price: 49, rating: 4.9, createdAt: '2025-02-01' },
                { id: 3, title: 'Python for Data Science', description: 'Master Python programming for data analysis and visualization.', thumbnail: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&h=160&fit=crop', students: 890, status: 'draft', price: 0, rating: 0, createdAt: '2025-02-15' }
            ],
            students: [
                { id: 1, name: 'John Doe', email: 'john@example.com', courseId: 1, courseTitle: 'Machine Learning Fundamentals', progress: 75, enrolledAt: '2025-01-15', lastActive: '2025-02-10' },
                { id: 2, name: 'Jane Smith', email: 'jane@example.com', courseId: 1, courseTitle: 'Machine Learning Fundamentals', progress: 45, enrolledAt: '2025-01-20', lastActive: '2025-02-12' },
                { id: 3, name: 'Mike Johnson', email: 'mike@example.com', courseId: 2, courseTitle: 'Advanced Machine Learning', progress: 30, enrolledAt: '2025-02-01', lastActive: '2025-02-11' },
                { id: 4, name: 'Sarah Williams', email: 'sarah@example.com', courseId: 2, courseTitle: 'Advanced Machine Learning', progress: 60, enrolledAt: '2025-02-05', lastActive: '2025-02-13' },
                { id: 5, name: 'David Brown', email: 'david@example.com', courseId: 1, courseTitle: 'Machine Learning Fundamentals', progress: 90, enrolledAt: '2025-01-10', lastActive: '2025-02-14' }
            ],
            assignments: [
                { id: 1, courseId: 1, title: 'Linear Regression Project', dueDate: '2025-02-20', submissions: 45, totalStudents: 1234, status: 'active' },
                { id: 2, courseId: 1, title: 'Classification Assignment', dueDate: '2025-02-28', submissions: 23, totalStudents: 1234, status: 'active' },
                { id: 3, courseId: 2, title: 'Neural Network Implementation', dueDate: '2025-03-05', submissions: 12, totalStudents: 567, status: 'active' }
            ],
            quizzes: [
                { id: 1, courseId: 1, title: 'ML Basics Quiz', questions: 10, avgScore: 78, attempts: 890, status: 'published' },
                { id: 2, courseId: 1, title: 'Algorithms Quiz', questions: 15, avgScore: 72, attempts: 756, status: 'published' },
                { id: 3, courseId: 2, title: 'Neural Networks Quiz', questions: 12, avgScore: 68, attempts: 234, status: 'draft' }
            ],
            liveClasses: [
                { id: 1, courseId: 1, title: 'Introduction to ML', date: '2025-02-18T15:00:00', attendees: 342, recording: null },
                { id: 2, courseId: 1, title: 'Model Evaluation', date: '2025-02-20T15:00:00', attendees: null, recording: null },
                { id: 3, courseId: 2, title: 'Neural Networks Overview', date: '2025-02-22T16:00:00', attendees: null, recording: 'https://example.com/recording1' }
            ],
            messages: [
                { id: 1, from: 'John Doe', message: 'I have a question about the assignment', date: '2025-02-14T10:30:00', read: false },
                { id: 2, from: 'Jane Smith', message: 'When is the next live session?', date: '2025-02-13T15:20:00', read: true }
            ]
        };

        let state = {
            currentPage: 'overview',
            charts: {}
        };

        // ============================================
        // AUTHENTICATION
        // ============================================
        function checkAuth() {
            const token = localStorage.getItem('accessToken');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token) {
                window.location.href = '/';
                return false;
            }
            
            if (user.role !== 'instructor' && user.role !== 'admin') {
                window.location.href = '/student-dashboard.html';
                return false;
            }
            
            document.getElementById('user-name').textContent = `${instructorData.user.firstName}`;
            return true;
        }

        // ============================================
        // UI HELPERS
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#3b82f6';
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${bgColor};
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                z-index: 1000;
                animation: fadeInUp 0.3s ease;
                font-weight: 500;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function loadPage(page) {
            const content = document.getElementById('main-content');
            content.innerHTML = '<div style="text-align: center; padding: 60px;"><div class="loading-spinner"></div></div>';
            
            state.currentPage = page;
            
            setTimeout(() => {
                let html = '';
                switch(page) {
                    case 'overview': html = renderOverview(); break;
                    case 'courses': html = renderCourses(); break;
                    case 'create-course': html = renderCreateCourse(); break;
                    case 'students': html = renderStudents(); break;
                    case 'assignments': html = renderAssignments(); break;
                    case 'quizzes': html = renderQuizzes(); break;
                    case 'live-classes': html = renderLiveClasses(); break;
                    case 'earnings': html = renderEarnings(); break;
                    case 'messages': html = renderMessages(); break;
                    case 'profile': html = renderProfile(); break;
                    default: html = renderOverview();
                }
                content.innerHTML = html;
                
                if (page === 'earnings') {
                    setTimeout(() => {
                        const ctx = document.getElementById('earningsChart')?.getContext('2d');
                        if (ctx) {
                            new Chart(ctx, {
                                type: 'pie',
                                data: {
                                    labels: ['Machine Learning Fundamentals', 'Advanced Machine Learning'],
                                    datasets: [{ data: [12500, 15950], backgroundColor: ['#2563eb', '#3b82f6'] }]
                                }
                            });
                        }
                    }, 100);
                }
            }, 300);
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-page') === page) {
                    link.classList.add('active');
                }
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            if (!checkAuth()) return;
            await loadPage('overview');
            loadNotifications();
            
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('user');
                window.location.href = '/';
            });
            
            document.getElementById('notification-bell').addEventListener('click', () => {
                document.getElementById('notifications-modal').classList.add('active');
                loadNotifications();
            });
            
            document.getElementById('close-notifications').addEventListener('click', () => {
                document.getElementById('notifications-modal').classList.remove('active');
            });
            
            document.getElementById('close-modal').addEventListener('click', closeModal);
            
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = link.getAttribute('data-page');
                    loadPage(page);
                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                });
            });
            
            const themeToggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });
        }
        
        init();
    </script>
</body>
</html>
